<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#ffffff">
  <title>AI Trade | 投资工作台</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="app.css?v=0.12.0-ui7">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">AT</div>
        <div>
          <strong>AI Trade</strong>
          <span>投资工作台</span>
        </div>
      </div>

      <div class="operating-stage">
        <span class="stage-label">当前权限</span>
        <strong>前向模拟</strong>
        <span class="stage-lock">真实下单已锁定</span>
      </div>

      <nav class="primary-nav" aria-label="工作台视图">
        <a href="#overview" data-route="overview">总览</a>
        <a href="#market" data-route="market">行情</a>
        <a href="#research" data-route="research">研究</a>
        <a href="#assistant" data-route="assistant">AI 分析</a>
        <a href="#strategy-lab" data-route="strategy-lab">策略实验室</a>
        <a href="#portfolio" data-route="portfolio">组合</a>
        <a href="#trading" data-route="trading">交易</a>
        <a href="#risk" data-route="risk">风险</a>
        <a href="#universe" data-route="universe">数据</a>
        <a href="#storage" data-route="storage">存储</a>
        <a href="#system" data-route="system">系统</a>
      </nav>

      <div class="sidebar-footer">
        <span class="connection-line" role="status" aria-live="polite" aria-atomic="true">
          <span id="connection-dot" class="connection-dot" aria-hidden="true"></span>
          <span id="connection-label">正在连接本机</span>
        </span>
        <span id="version-label">AI Trade</span>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <strong class="mobile-brand">AI Trade</strong>
          <span id="route-context">投资工作台</span>
          <h1 id="route-title">总览</h1>
        </div>
        <div class="topbar-tools">
          <span id="market-date" class="quiet-meta" role="status" aria-live="polite" aria-atomic="true">数据日期待确认</span>
          <span id="job-indicator" class="status-chip neutral" role="status" aria-live="polite" aria-atomic="true">无运行任务</span>
          <span id="signed-in-user" class="quiet-meta account-label">内测账号</span>
          <button id="refresh-view" class="button secondary" type="button">刷新视图</button>
          <button id="logout" class="button secondary" type="button">退出</button>
        </div>
      </header>

      <section id="market-pulse" class="market-pulse" aria-labelledby="market-pulse-title" aria-busy="true">
        <div class="market-pulse-heading">
          <strong id="market-pulse-title">市场脉冲</strong>
          <span>收盘快照</span>
        </div>
        <dl id="market-pulse-track" class="market-pulse-track" tabindex="0" aria-describedby="market-pulse-help">
          <div class="market-pulse-placeholder"><dt>行情</dt><dd>正在校验</dd></div>
          <div class="market-pulse-placeholder"><dt>策略</dt><dd>正在校验</dd></div>
          <div class="market-pulse-placeholder"><dt>组合</dt><dd>正在校验</dd></div>
          <div class="market-pulse-placeholder"><dt>风险权限</dt><dd>正在校验</dd></div>
          <div class="market-pulse-placeholder"><dt>运行</dt><dd>正在连接</dd></div>
        </dl>
      </section>

      <main id="main-content" tabindex="-1" aria-busy="true"></main>
    </section>
  </div>

  <p id="table-scroll-help" class="sr-only">宽表可横向滚动；聚焦表格区域后可使用方向键查看隐藏列。</p>
  <p id="market-pulse-help" class="sr-only">市场脉冲带显示最近完整收盘快照、策略、组合、风险权限和本机任务状态；聚焦后可使用左右方向键连续查看。</p>
  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <script src="vendor/klinecharts.min.js?v=10.0.0" defer></script>
  <script src="app.js?v=0.12.0-ui7" defer></script>
</body>
</html>
