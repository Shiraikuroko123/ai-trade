services:
  workstation:
    volumes:
      - type: bind
        source: ./config
        target: /workspace/config
        read_only: true
      - type: bind
        source: ./data
        target: /workspace/data
      - type: bind
        source: ./reports
        target: /workspace/reports
      - type: bind
        source: ./state
        target: /workspace/state
      - type: bind
        source: ./logs
        target: /workspace/logs
      - type: bind
        source: ./local
        target: /workspace/local
