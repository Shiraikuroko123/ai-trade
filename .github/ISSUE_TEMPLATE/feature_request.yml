name: Feature request
description: Propose a research, risk, data, or paper-trading improvement
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which concrete limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Financial and operational risks
      description: Include look-ahead, overfitting, execution, credential, and live-trading implications.
    validations:
      required: true
